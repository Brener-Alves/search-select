<div class="acoes">
  <button type="button" (click)="setarValor()">Alterar valor</button>
</div>

<form [formGroup]="form" class="container-form">
  <virtual-search-select
    titulo="Teste"
    [lista]="lista"
    [iniciarTodosMarcados]="true"
    [exibirQuantidade]="true"
    [ordenar]="false"
    formControlName="teste"
  ></virtual-search-select>

  <mat-form-field appearance="outline">
    <mat-label>Toppings</mat-label>
    <mat-select [formControl]="toppings" multiple>
      <mat-select-trigger>
        {{toppings.value ? toppings.value[0] : ''}}
        <span
          *ngIf="toppings.value?.length > 1"
          class="example-additional-selection"
        >
          (+{{toppings.value.length - 1}} {{toppings.value?.length === 2 ?
          'other' : 'others'}})
        </span>
      </mat-select-trigger>
      <mat-option *ngFor="let topping of toppingList" [value]="topping"
        >{{topping}}</mat-option
      >
    </mat-select>

    <mat-error>Campo obrigatório</mat-error>
  </mat-form-field>
</form>

<p>Errors control: {{ this.form.get("teste")?.errors | json }}</p>
<p>Status form: {{ this.form.status }}</p>
