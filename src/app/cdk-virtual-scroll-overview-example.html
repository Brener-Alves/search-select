<div class="acoes">
  <button type="button" (click)="setarValor()">Alterar valor</button>
  <button type="button" (click)="reset()">Reset</button>
  <button type="button" (click)="printForm()">Imprimir form</button>
  <button type="button" (click)="disable()">Desabilitar form</button>
  <button type="button" (click)="enable()">Habilitar form</button>
</div>

<form [formGroup]="form" class="container-form">
  <virtual-search-select
    titulo="Múltiplo"
    valueKey="id"
    labelKey="nome"
    [lista]="lista"
    [multiple]="true"
    [ordenar]="false"
    [iniciarTodosMarcados]="false"
    formControlName="testeMultiplo"
  ></virtual-search-select>

  <mat-form-field appearance="outline">
    <mat-label>Original</mat-label>
    <mat-select formControlName="toppings" multiple>
      <mat-option *ngFor="let topping of toppingList" [value]="topping"
        >{{topping}}</mat-option
      >
    </mat-select>
    <mat-error>Campo obrigatório</mat-error>
  </mat-form-field>

  <virtual-search-select
    titulo="Seleção única"
    valueKey="id"
    labelKey="nome"
    [lista]="lista"
    [ordenar]="false"
    [multiple]="false"
    formControlName="testeUnico"
  ></virtual-search-select>
</form>

<p>Multiple value: {{ form.get("testeMultiplo")?.value | json }}</p>
<p>Single value: {{ form.get("testeUnico")?.value | json }}</p>

<p>Status form: {{ form.status }}</p>
