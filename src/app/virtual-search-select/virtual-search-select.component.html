<div
  #inputSelect
  class="input-select"
  cdkOverlayOrigin
  #trigger="cdkOverlayOrigin"
  [class.input-select--disabled]="isDisabled"
  (click)="!isDisabled && alterarExibicaoOpcoes()"
  (keydown)="!isDisabled && onSelectKeydown($event)"
  [attr.tabindex]="isDisabled ? -1 : 0"
  role="combobox"
  [attr.aria-expanded]="exibirOverlayOpcoes"
  [attr.aria-haspopup]="'listbox'"
  [attr.aria-disabled]="isDisabled"
  [attr.aria-label]="titulo"
  (focus)="isFocused = true"
  (blur)="isFocused = false"
>
  <mat-form-field
    [style.width.%]="100"
    appearance="outline"
    [class.mat-focused]="exibirOverlayOpcoes || isFocused"
  >
    <mat-label>{{ titulo }}</mat-label>

    <input
      class="sr-only"
      matInput
      type="text"
      [formControl]="displayControl"
      readonly
      tabindex="-1"
    />

    <div
      class="mat-select"
      [class.mat-select-disabled]="isDisabled"
      [class.mat-select-invalid]="
        displayControl.invalid &&
        (displayControl.dirty || displayControl.touched)
      "
    >
      <div class="mat-select-trigger" [style.height.px]="0">
        <span class="mat-select-value">{{ displayControl.value }}</span>

        <div class="mat-select-arrow" [style.margin-top.px]="-12"></div>
      </div>
    </div>

    <mat-hint align="end" *ngIf="multiple">
      {{ selected.size | number }} / {{ lista.length | number }}
    </mat-hint>

    <mat-error>{{ errorMessage }}</mat-error>
  </mat-form-field>
</div>

<ng-template
  cdkConnectedOverlay
  [cdkConnectedOverlayOrigin]="trigger"
  [cdkConnectedOverlayOpen]="exibirOverlayOpcoes"
  [cdkConnectedOverlayWidth]="inputSelect.offsetWidth"
  [cdkConnectedOverlayHasBackdrop]="true"
  [cdkConnectedOverlayBackdropClass]="'overlay-transparent'"
  [cdkConnectedOverlayPanelClass]="'vss-overlay-panel'"
  [cdkConnectedOverlayOffsetY]="-25"
  (backdropClick)="fecharOverlay()"
  (overlayKeydown)="onOverlayKeydown($event)"
>
  <!-- Barra de busca + select-all (select-all apenas no modo múltiplo) -->
  <div class="search-form-field" role="search">
    <mat-checkbox
      *ngIf="multiple"
      class="select-all-checkbox"
      (click)="$event.preventDefault(); changeAll()"
      (keydown.enter)="$event.preventDefault(); changeAll()"
      (keydown.space)="$event.preventDefault(); changeAll()"
      [checked]="completed"
      [indeterminate]="indeterminated"
      color="primary"
      aria-label="Selecionar todos"
    ></mat-checkbox>

    <input
      #searchInput
      type="search"
      class="search-input"
      [class.search-input--no-checkbox]="!multiple"
      [(ngModel)]="filterValue"
      (input)="applyFilter()"
      placeholder="Pesquisar"
      autocomplete="off"
      aria-label="Pesquisar opções"
    />

    <button
      *ngIf="filterValue"
      type="button"
      mat-icon-button
      class="clear-button"
      aria-label="Limpar pesquisa"
      (click)="clearFilter()"
    >
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Lista virtualizada -->
  <cdk-virtual-scroll-viewport
    itemSize="50"
    class="viewport"
    [style.height.px]="viewportHeight"
    role="listbox"
    [attr.aria-label]="titulo"
    [attr.aria-multiselectable]="multiple"
  >
    <!-- ── Modo MÚLTIPLO ── -->
    <ng-container *ngIf="multiple; else singleMode">
      <div
        *cdkVirtualFor="let item of filteredList; trackBy: trackByValue"
        class="item"
        matRipple
        [style.max-width.px]="inputSelect.offsetWidth"
        [class.item--selected]="selected.has(item[valueKey])"
        (click)="changeSelected(item[valueKey])"
        (keydown.enter)="changeSelected(item[valueKey])"
        (keydown.space)="
          $event.preventDefault(); changeSelected(item[valueKey])
        "
        role="option"
        [attr.aria-selected]="selected.has(item[valueKey])"
        tabindex="0"
      >
        <mat-checkbox
          [checked]="selected.has(item[valueKey])"
          (click)="$event.preventDefault()"
          (keydown.enter)="$event.preventDefault()"
          (keydown.space)="$event.preventDefault()"
          aria-hidden="true"
          tabindex="-1"
          color="primary"
        ></mat-checkbox>
        <span class="label">{{ item[labelKey] }}</span>
      </div>
    </ng-container>

    <!-- ── Modo ÚNICO ── -->
    <ng-template #singleMode>
      <div
        *cdkVirtualFor="let item of filteredList; trackBy: trackByValue"
        class="item item--single"
        matRipple
        [style.max-width.px]="inputSelect.offsetWidth"
        [class.item--selected]="selected.has(item[valueKey])"
        (click)="changeSelected(item[valueKey])"
        (keydown.enter)="changeSelected(item[valueKey])"
        (keydown.space)="
          $event.preventDefault(); changeSelected(item[valueKey])
        "
        role="option"
        [attr.aria-selected]="selected.has(item[valueKey])"
        tabindex="0"
      >
        <span class="label">{{ item[labelKey] }}</span>
        <mat-icon
          *ngIf="selected.has(item[valueKey])"
          class="single-check-icon"
          aria-hidden="true"
          color="primary"
          >check</mat-icon
        >
      </div>
    </ng-template>

    <p
      *ngIf="!filteredList.length"
      class="no-results"
      role="status"
      aria-live="polite"
    >
      Nenhum resultado encontrado.
    </p>
  </cdk-virtual-scroll-viewport>
</ng-template>
